name: ETH Trading Bot

on:
  schedule:
    # Runs at the start of every hour (UTC)
    - cron: '0 * * * *'

  # Manual trigger from Actions tab — use this to test first
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy requests

      - name: Run trading bot
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          DELTA_WEBHOOK_URL: ${{ secrets.DELTA_WEBHOOK_URL }}
        run: python eth_trading_bot.py

      # Commit state.json back so position/recovery persists between runs
      - name: Save state back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json || true
          git diff --staged --quiet || git commit -m "state: update [skip ci]"
          git push || true
