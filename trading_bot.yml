name: ETH Trading Bot

on:
  schedule:
    # Runs at the start of every hour (UTC)
    # GitHub Actions cron uses UTC — matches our pause window logic
    - cron: '0 * * * *'

  # Also allows manual trigger from GitHub Actions tab (useful for testing)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10       # kill if hangs (safety net)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy requests

      - name: Run trading bot
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          DELTA_API_KEY:     ${{ secrets.DELTA_API_KEY }}
          DELTA_API_SECRET:  ${{ secrets.DELTA_API_SECRET }}
          DELTA_WEBHOOK_URL: ${{ secrets.DELTA_WEBHOOK_URL }}
        run: python eth_trading_bot.py

      # State file (position/recovery) needs to persist between hourly runs.
      # GitHub Actions workspace is wiped after each run, so we commit
      # state.json back to the repo after every execution.
      - name: Save state back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json || true
          git diff --staged --quiet || git commit -m "state: update [skip ci]"
          git push || true
